<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Customize Meal - Canteen Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#2a1700",
                    "on-tertiary-fixed-variant": "#004395",
                    "on-surface": "#0b1c30",
                    "surface-container-low": "#eff4ff",
                    "on-primary-container": "#00422b",
                    "surface-container-highest": "#d3e4fe",
                    "primary-container": "#10b981",
                    "surface": "#f8f9ff",
                    "secondary-fixed-dim": "#ffb95f",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#71a1ff",
                    "inverse-primary": "#4edea3",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#3c4a42",
                    "on-secondary-fixed-variant": "#653e00",
                    "tertiary": "#005ac2",
                    "error": "#ba1a1a",
                    "primary": "#006c49",
                    "on-tertiary-fixed": "#001a42",
                    "on-secondary-container": "#684000",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#dce9ff",
                    "surface-container": "#e5eeff",
                    "on-primary-fixed": "#002113",
                    "on-primary": "#ffffff",
                    "secondary-container": "#fea619",
                    "surface-bright": "#f8f9ff",
                    "inverse-on-surface": "#eaf1ff",
                    "tertiary-fixed": "#d8e2ff",
                    "outline-variant": "#bbcabf",
                    "on-primary-fixed-variant": "#005236",
                    "on-background": "#0b1c30",
                    "secondary-fixed": "#ffddb8",
                    "secondary": "#855300",
                    "tertiary-fixed-dim": "#adc6ff",
                    "primary-fixed-dim": "#4edea3",
                    "surface-variant": "#d3e4fe",
                    "surface-dim": "#cbdbf5",
                    "primary-fixed": "#6ffbbe",
                    "on-tertiary-container": "#00367a",
                    "on-error": "#ffffff",
                    "inverse-surface": "#213145",
                    "surface-tint": "#006c49",
                    "background": "#f8f9ff",
                    "outline": "#6c7a71"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "1rem",
                    "section-gap": "2rem",
                    "gutter": "1rem",
                    "container-margin": "1rem"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["26px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-lg overflow-x-hidden">
<!-- Top AppBar (Suppressed shared navigation for transactional focus) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 backdrop-blur-md bg-surface/90">
<button class="p-2 hover:bg-surface-container rounded-full transition-colors duration-200" onclick="window.history.back()">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Customize Meal</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="pt-20 pb-32 px-container-margin max-w-2xl mx-auto space-y-section-gap">
<!-- Hero Section: Food Image & Identity -->
<section class="space-y-stack-gap">
<div class="relative w-full aspect-[4/3] rounded-xl overflow-hidden shadow-sm">
<img alt="Dal Bhat Tarkari" class="w-full h-full object-cover" data-alt="A professional top-down food photography shot of a traditional Dal Bhat Tarkari set served in a polished brass thali. The meal includes a vibrant lentil soup, fragrant basmati rice, spiced vegetable curry, and fresh spinach. The scene is bathed in bright, natural daylight highlighting the rich textures and colors of the spices against a clean, minimalist wooden table background, reflecting a modern and healthy lunch aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6EIl5JWy8y3OthATLE8C41RSO0Ac7NAf_aMltOGV9VTGM-HRHrgXEsTImWJQHuKN83uAs4xPevqHJ-1eT4BsGWqtymIZ-wrbj_b6eDHcpZ_bF4SW1-locmxUb7u1P0XS2bIH8JxsKWkZ-dzkhLe9tt9pzm1Htc1c8AF5eN-ox5lsWwGtgygcpV8RWY0i4acKq8NAj9P943M7P8u1iQeYvppb2ryRqyjN1wKb7VW8cMylCWorx1YXFppsGUkf-u8w37YoYs31Obos"/>
<div class="absolute bottom-4 left-4 bg-surface/90 backdrop-blur-md px-3 py-1 rounded-full border border-outline-variant/30">
<span class="font-label-caps text-label-caps text-primary uppercase">Main Course</span>
</div>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile">Dal Bhat Tarkari</h2>
<p class="font-body-sm text-on-surface-variant">Traditional Nepali platter with organic lentils, seasonal vegetables, and aromatic spices.</p>
</div>
</section>
<!-- Nutritional Info Grid -->
<section class="grid grid-cols-3 gap-stack-gap">
<div class="bg-surface-container-low border border-outline-variant/20 rounded-xl p-4 flex flex-col items-center justify-center space-y-1">
<span class="font-label-caps text-label-caps text-on-surface-variant">CALORIES</span>
<span class="font-headline-md text-headline-md text-primary">640</span>
</div>
<div class="bg-surface-container-low border border-outline-variant/20 rounded-xl p-4 flex flex-col items-center justify-center space-y-1">
<span class="font-label-caps text-label-caps text-on-surface-variant">PROTEIN</span>
<span class="font-headline-md text-headline-md text-primary">24g</span>
</div>
<div class="bg-surface-container-low border border-outline-variant/20 rounded-xl p-4 flex flex-col items-center justify-center space-y-1">
<span class="font-label-caps text-label-caps text-on-surface-variant">CARBS</span>
<span class="font-headline-md text-headline-md text-primary">82g</span>
</div>
</section>
<!-- Dietary Overrides -->
<section class="space-y-stack-gap">
<h3 class="font-headline-md text-headline-md">Dietary Adjustments</h3>
<div class="grid grid-cols-1 gap-3">
<label class="flex items-center justify-between p-4 bg-surface-container border border-outline-variant/30 rounded-xl cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">eco</span>
<span class="font-body-lg">Vegan Preparation</span>
</div>
<input class="w-6 h-6 rounded-md border-outline text-primary focus:ring-primary" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container border border-outline-variant/30 rounded-xl cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">no_meals</span>
<span class="font-body-lg">Gluten Free Grains</span>
</div>
<input class="w-6 h-6 rounded-md border-outline text-primary focus:ring-primary" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container border border-outline-variant/30 rounded-xl cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">health_and_safety</span>
<span class="font-body-lg">Low Sodium (Less salt)</span>
</div>
<input class="w-6 h-6 rounded-md border-outline text-primary focus:ring-primary" type="checkbox"/>
</label>
</div>
</section>
<!-- Extra Accompaniments (Bento Style Chips) -->
<section class="space-y-stack-gap">
<h3 class="font-headline-md text-headline-md">Extra Portions</h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-white border border-outline-variant/50 rounded-full text-body-sm hover:border-primary hover:text-primary transition-all">Extra Pickles (Achaar)</button>
<button class="px-4 py-2 bg-white border border-outline-variant/50 rounded-full text-body-sm hover:border-primary hover:text-primary transition-all">Extra Ghee</button>
<button class="px-4 py-2 bg-white border border-outline-variant/50 rounded-full text-body-sm hover:border-primary hover:text-primary transition-all">Papadum Cracker</button>
<button class="px-4 py-2 bg-white border border-outline-variant/50 rounded-full text-body-sm hover:border-primary hover:text-primary transition-all">Brown Rice Upgrade</button>
<button class="px-4 py-2 bg-white border border-outline-variant/50 rounded-full text-body-sm hover:border-primary hover:text-primary transition-all">Add Grilled Chicken (+NPR 150)</button><button class="px-4 py-2 bg-white border border-outline-variant/50 rounded-full text-body-sm hover:border-primary hover:text-primary transition-all">Add Buff Keema (+NPR 120)</button><button class="px-4 py-2 bg-white border border-outline-variant/50 rounded-full text-body-sm hover:border-primary hover:text-primary transition-all">Extra Paneer Cubes (+NPR 80)</button><button class="px-4 py-2 bg-white border border-outline-variant/50 rounded-full text-body-sm hover:border-primary hover:text-primary transition-all">Extra Seasonal Veggies (+NPR 50)</button></div>
</section>
<!-- Special Instructions -->
<section class="space-y-stack-gap">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">edit_note</span>
<h3 class="font-headline-md text-headline-md">Special Instructions</h3>
</div>
<textarea class="w-full min-h-[120px] bg-surface-container-low border border-outline-variant/50 rounded-xl p-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/50 font-body-lg" placeholder="E.g., 'Please make it extra spicy' or 'Keep the gravy separate'..."></textarea>
</section>
</main>
<!-- Fixed Action Footer -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-outline-variant/30 p-4 z-50">
<div class="max-w-2xl mx-auto flex gap-4">
<button class="flex-1 h-12 bg-surface-container-highest text-on-surface-variant font-bold rounded-xl hover:bg-outline-variant/30 transition-all">
                Cancel
            </button>
<button class="flex-[2] h-12 bg-primary-container text-on-primary-container font-bold rounded-xl shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all">
                Save Changes
            </button>
</div>
</footer>
<script>
        // Micro-interaction for selecting extras
        document.querySelectorAll('button.rounded-full').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.toggle('bg-primary-container');
                btn.classList.toggle('text-on-primary-container');
                btn.classList.toggle('border-primary');
            });
        });

        // Feedback on Save
        document.querySelector('button.bg-primary-container').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerText;
            btn.innerText = "Saving...";
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerText = "Saved Successfully!";
                btn.classList.replace('bg-primary-container', 'bg-primary');
                btn.classList.replace('text-on-primary-container', 'text-white');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-primary', 'bg-primary-container');
                    btn.classList.replace('text-white', 'text-on-primary-container');
                    btn.disabled = false;
                }, 2000);
            }, 800);
        });
    </script>
</body></html>
